  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script 
      src="https://widgets.leadconnectorhq.com/loader.js"  
      data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js" 
      data-widget-id="696fd454572f85432b83c7bf">
    </script>
    <script>
      // Wait for widget to load, then hide the launcher bubble inside shadow DOM
      function hideLauncherBubble() {
        var chatWidget = document.querySelector('chat-widget');
        if (chatWidget && chatWidget.shadowRoot) {
          // Find and hide the launcher/open button inside shadow DOM
          var launcher = chatWidget.shadowRoot.querySelector('.launcher, .open-button, [class*="launcher"], [class*="open"], button');
          if (launcher) {
            launcher.style.display = 'none';
          }
          // Also try to hide the whole widget-open container
          var containers = chatWidget.shadowRoot.querySelectorAll('[class*="widget-open"], [class*="chat-open"]');
          containers.forEach(function(el) {
            if (!el.closest('[class*="chat-body"]') && !el.closest('[class*="conversation"]')) {
              el.style.display = 'none';
            }
          });
        }
      }
      
      // Poll until widget loads and hide launcher
      var hideAttempts = 0;
      var hideInterval = setInterval(function() {
        hideAttempts++;
        var chatWidget = document.querySelector('chat-widget');
        if (chatWidget && chatWidget.shadowRoot) {
          hideLauncherBubble();
          // Check if launcher exists and is hidden
          var launcher = chatWidget.shadowRoot.querySelector('.launcher, .open-button, [class*="launcher"], [class*="open"]');
          if (!launcher || launcher.style.display === 'none') {
            clearInterval(hideInterval);
          }
        }
        if (hideAttempts > 30) {
          clearInterval(hideInterval);
        }
      }, 500);
      
      // Open chat widget using the official API
      window.openLeadConnectorChat = function() {
        var maxAttempts = 10;
        var attempts = 0;
        
        function tryOpen() {
          attempts++;
          if (window.leadConnector && window.leadConnector.chatWidget && window.leadConnector.chatWidget.isLoaded) {
            window.leadConnector.chatWidget.openWidget();
          } else if (attempts < maxAttempts) {
            setTimeout(tryOpen, 200);
          }
        }
        
        tryOpen();
      };
    </script>
  </body>
