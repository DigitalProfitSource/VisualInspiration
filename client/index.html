  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script 
      src="https://widgets.leadconnectorhq.com/loader.js"  
      data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js" 
      data-widget-id="696fd454572f85432b83c7bf">
    </script>
    <style>
      /* Hide the LeadConnector chat-widget launcher bubble */
      chat-widget {
        --chat-widget-position: fixed !important;
        --chat-widget-bottom: -9999px !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
        height: 0 !important;
        width: 0 !important;
        overflow: hidden !important;
      }
      /* When active (chat is open), make it visible */
      chat-widget.hydrated[class*="active"],
      chat-widget.active {
        opacity: 1 !important;
        pointer-events: auto !important;
        visibility: visible !important;
        height: auto !important;
        width: auto !important;
        bottom: auto !important;
        --chat-widget-bottom: 20px !important;
      }
    </style>
    <script>
      // Open chat widget using the official API
      window.openLeadConnectorChat = function() {
        if (window.leadConnector && window.leadConnector.chatWidget && typeof window.leadConnector.chatWidget.openWidget === 'function') {
          // Make the widget visible before opening
          var chatWidget = document.querySelector('chat-widget');
          if (chatWidget) {
            chatWidget.style.opacity = '1';
            chatWidget.style.pointerEvents = 'auto';
            chatWidget.style.visibility = 'visible';
            chatWidget.style.height = 'auto';
            chatWidget.style.width = 'auto';
          }
          window.leadConnector.chatWidget.openWidget();
        } else {
          console.log('Chat widget API not available yet');
        }
      };
    </script>
  </body>
