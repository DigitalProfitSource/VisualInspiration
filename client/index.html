  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <style>
      /* Force hide the chat widget bubble completely */
      chat-widget {
        position: fixed !important;
        bottom: -9999px !important;
        right: -9999px !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
        z-index: -1 !important;
      }
      /* When chat is actively open, show it */
      chat-widget.lc-chat-open {
        bottom: 20px !important;
        right: 20px !important;
        opacity: 1 !important;
        pointer-events: auto !important;
        visibility: visible !important;
        z-index: 999999 !important;
      }
    </style>
    <script 
      src="https://widgets.leadconnectorhq.com/loader.js"  
      data-resources-url="https://widgets.leadconnectorhq.com/chat-widget/loader.js" 
      data-widget-id="696fd454572f85432b83c7bf">
    </script>
    <script>
      // Open chat widget and make it visible
      window.openLeadConnectorChat = function() {
        console.log('Button clicked - attempting to open chat');
        var chatWidget = document.querySelector('chat-widget');
        
        // Show the widget
        if (chatWidget) {
          chatWidget.classList.add('lc-chat-open');
          chatWidget.style.cssText = 'position: fixed !important; bottom: 20px !important; right: 20px !important; opacity: 1 !important; pointer-events: auto !important; visibility: visible !important; z-index: 999999 !important;';
          console.log('Widget made visible');
        }
        
        // Call the API to open the chat
        var maxAttempts = 20;
        var attempts = 0;
        
        function tryOpen() {
          attempts++;
          console.log('Attempt ' + attempts + ' to open widget');
          
          if (window.leadConnector && window.leadConnector.chatWidget) {
            console.log('API available, isLoaded:', window.leadConnector.chatWidget.isLoaded);
            if (window.leadConnector.chatWidget.isLoaded) {
              window.leadConnector.chatWidget.openWidget();
              console.log('openWidget() called');
              return;
            }
          }
          
          if (attempts < maxAttempts) {
            setTimeout(tryOpen, 300);
          } else {
            console.log('Max attempts reached');
          }
        }
        
        tryOpen();
      };
    </script>
  </body>
